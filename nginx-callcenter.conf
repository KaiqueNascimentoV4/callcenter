# /etc/nginx/sites-available/callcenter
# Cole este arquivo na VPS e faça symlink para sites-enabled

server {
    listen 80;
    server_name api-call.v4companyamaral.com;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;

        # WebSocket headers (obrigatório para Twilio Media Streams)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout longo para WebSocket de chamadas (10 minutos)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
