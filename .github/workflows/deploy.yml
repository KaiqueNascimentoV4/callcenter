name: Build & Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "frontend/**"
      - "*.md"

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kaiquenascimentov4/callcenter:latest
            ghcr.io/kaiquenascimentov4/callcenter:${{ github.sha }}

      - name: Notifica Portainer para redeployar
        run: |
          if [ -n "${{ secrets.PORTAINER_WEBHOOK }}" ]; then
            curl -X POST "${{ secrets.PORTAINER_WEBHOOK }}"
          fi
